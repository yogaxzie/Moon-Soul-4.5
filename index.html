<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Soul 4.5 - Developer Access</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>
    <div class="login-container">
        <div class="moon-icon">🌙</div>
        <h1 class="glitch" data-text="MOON SOUL 4.5">MOON SOUL 4.5</h1>
        <p class="subtitle">DEVELOPER PORTAL v4.5</p>
        
        <div class="warning-banner">
            ⚠️ SELF DESTRUCT MODE: ACTIVE ⚠️
        </div>
        
        <form id="loginForm">
            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" id="username" placeholder="Enter username..." autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="Enter password...">
            </div>
            
            <div class="input-group">
                <label>LOGIN CODE</label>
                <input type="text" id="loginCode" placeholder="Enter login code..." autocomplete="off">
            </div>
            
            <button type="submit" id="loginBtn">INITIALIZE ACCESS</button>
        </form>
        
        <div class="footer">
            <p>⚠️ UNAUTHORIZED ACCESS WILL BE TRACKED ⚠️</p>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // HARDCODED CREDENTIALS (Dev Mode)
        const DEV_USERNAME = "Moon4.5";
        const DEV_PASSWORD = "soul4.5";
        const DEV_CODE = "Cv27soul";
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginCode = document.getElementById('loginCode').value;
            
            if (username === DEV_USERNAME && password === DEV_PASSWORD && loginCode === DEV_CODE) {
                // Set session flag
                sessionStorage.setItem('moonSoulAuth', 'true');
                sessionStorage.setItem('devUser', username);
                
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                alert('ACCESS DENIED: Invalid credentials!');
            }
        });
    </script>
</body>
  </html>
